{% extends "base.html" %}

{% block title %}Task Queue - Twitter Saver{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-list-task"></i> Task Queue</h2>
    <div>
        <select class="form-select" id="status-filter" style="width: auto; display: inline-block;">
            <option value="">All</option>
            <option value="pending">Pending</option>
            <option value="processing">Processing</option>
            <option value="completed">Completed</option>
            <option value="failed">Failed</option>
        </select>
        <button class="btn btn-outline-primary ms-2" onclick="loadTasks()">
            <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <div id="loading" class="text-center py-4">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading tasks...</span>
            </div>
        </div>

        <div id="tasks-container" style="display: none;">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>URL</th>
                            <th>Status</th>
                            <th>Tweet Info</th>
                            <th>Created</th>
                            <th>Processed</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tasks-tbody">
                        <!-- Task list will be loaded here dynamically -->
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <nav aria-label="Task pagination">
                <ul class="pagination justify-content-center" id="pagination">
                    <!-- Pagination buttons will be generated here dynamically -->
                </ul>
            </nav>
        </div>

        <div id="no-tasks" class="text-center py-4" style="display: none;">
            <i class="bi bi-inbox" style="font-size: 3rem; color: #6c757d;"></i>
            <p class="text-muted mt-2">No tasks</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let currentPage = 1;
    const perPage = 20;

    // Load task list
    function loadTasks(page = 1) {
        const statusFilter = document.getElementById('status-filter').value;
        const loading = document.getElementById('loading');
        const container = document.getElementById('tasks-container');
        const noTasks = document.getElementById('no-tasks');

        loading.style.display = 'block';
        container.style.display = 'none';
        noTasks.style.display = 'none';

        const params = new URLSearchParams({
            page: page,
            per_page: perPage
        });

        if (statusFilter) {
            params.append('status', statusFilter);
        }

        fetch(`/api/tasks?${params}`)
            .then(response => response.json())
            .then(data => {
                loading.style.display = 'none';

                if (data.tasks.length === 0) {
                    noTasks.style.display = 'block';
                    return;
                }

                container.style.display = 'block';
                renderTasks(data.tasks);
                renderPagination(data.page, data.pages, data.total);
                currentPage = page;
            })
            .catch(error => {
                console.error('Error loading tasks:', error);
                loading.style.display = 'none';
                showToast('Failed to load tasks', 'error');
            });
    }

    // Render task list
    function renderTasks(tasks) {
        const tbody = document.getElementById('tasks-tbody');
        tbody.innerHTML = '';

        tasks.forEach(task => {
            const row = document.createElement('tr');

            // Status style
            const statusClass = `status-${task.status}`;
            const statusText = {
                'pending': 'Pending',
                'processing': 'Processing',
                'completed': 'Completed',
                'failed': 'Failed'
            }[task.status] || task.status;

            // Tweet info
            let tweetInfo = '-';
            if (task.author_username && task.tweet_id) {
                tweetInfo = `@${task.author_username}`;
                if (task.is_thread) {
                    tweetInfo += ` (Thread ${task.tweet_count})`;
                }
                if (task.media_count > 0) {
                    tweetInfo += ` <i class="bi bi-image" title="${task.media_count} media files"></i>`;
                }
            }

            // Action buttons
            let actions = '<div class="btn-group">';
            if (task.status === 'completed') {
                // Use share_slug if available, otherwise use ID (backward compatible)
                const viewUrl = task.share_slug ? `/view/${task.share_slug}` : `/view/${task.id}`;
                actions += `<a href="${viewUrl}" class="btn btn-sm btn-outline-primary" target="_blank">
                    <i class="bi bi-eye"></i> View
                </a>`;
            } else if (task.status === 'failed') {
                actions += `<button class="btn btn-sm btn-outline-warning" onclick="showError(${task.id}, '${task.error_message || ''}')">
                    <i class="bi bi-exclamation-triangle"></i> Error
                </button>`;
            }

            actions += `<button class="btn btn-sm btn-outline-danger" onclick="deleteTask(${task.id}, this)" title="Delete task">
                <i class="bi bi-trash"></i>
            </button></div>`;

            row.innerHTML = `
                <td>${task.id}</td>
                <td>
                    <a href="${task.url}" target="_blank" class="text-decoration-none">
                        ${task.url.length > 50 ? task.url.substring(0, 50) + '...' : task.url}
                    </a>
                </td>
                <td><span class="${statusClass}"><i class="bi bi-circle-fill"></i> ${statusText}</span></td>
                <td>${tweetInfo}</td>
                <td>${task.created_at || '-'}</td>
                <td>${task.processed_at || '-'}</td>
                <td>${actions}</td>
            `;

            tbody.appendChild(row);
        });
    }

    // Render pagination
    function renderPagination(currentPage, totalPages, totalItems) {
        const pagination = document.getElementById('pagination');
        pagination.innerHTML = '';

        if (totalPages <= 1) return;

        // Previous page
        const prevLi = document.createElement('li');
        prevLi.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
        prevLi.innerHTML = `<a class="page-link" href="#" onclick="loadTasks(${currentPage - 1})">Previous</a>`;
        pagination.appendChild(prevLi);

        // Page numbers
        const startPage = Math.max(1, currentPage - 2);
        const endPage = Math.min(totalPages, currentPage + 2);

        if (startPage > 1) {
            const li = document.createElement('li');
            li.className = 'page-item';
            li.innerHTML = `<a class="page-link" href="#" onclick="loadTasks(1)">1</a>`;
            pagination.appendChild(li);

            if (startPage > 2) {
                const li = document.createElement('li');
                li.className = 'page-item disabled';
                li.innerHTML = `<span class="page-link">...</span>`;
                pagination.appendChild(li);
            }
        }

        for (let i = startPage; i <= endPage; i++) {
            const li = document.createElement('li');
            li.className = `page-item ${i === currentPage ? 'active' : ''}`;
            li.innerHTML = `<a class="page-link" href="#" onclick="loadTasks(${i})">${i}</a>`;
            pagination.appendChild(li);
        }

        if (endPage < totalPages) {
            if (endPage < totalPages - 1) {
                const li = document.createElement('li');
                li.className = 'page-item disabled';
                li.innerHTML = `<span class="page-link">...</span>`;
                pagination.appendChild(li);
            }

            const li = document.createElement('li');
            li.className = 'page-item';
            li.innerHTML = `<a class="page-link" href="#" onclick="loadTasks(${totalPages})">${totalPages}</a>`;
            pagination.appendChild(li);
        }

        // Next page
        const nextLi = document.createElement('li');
        nextLi.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
        nextLi.innerHTML = `<a class="page-link" href="#" onclick="loadTasks(${currentPage + 1})">Next</a>`;
        pagination.appendChild(nextLi);
    }

    // Show error message
    function showError(taskId, errorMessage) {
        showToast(`Task ${taskId} error: ${errorMessage}`, 'error');
    }

    // Delete task
    function deleteTask(taskId, btn) {
        if (confirm(`Delete task #${taskId}?`)) {
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>';
            btn.disabled = true;

            fetch(`/delete/${taskId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showToast('Task deleted', 'success');
                        loadTasks(currentPage);
                    } else {
                        showToast(data.message || 'Delete failed', 'error');
                        btn.innerHTML = originalHtml;
                        btn.disabled = false;
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showToast('Delete request failed', 'error');
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                });
        }
    }

    // Status filter change
    document.getElementById('status-filter').addEventListener('change', function () {
        loadTasks(1);
    });

    // Initial load
    loadTasks();

    // Periodic refresh (only on page 1 with no status filter)
    setInterval(() => {
        if (currentPage === 1 && !document.getElementById('status-filter').value) {
            loadTasks(1);
        }
    }, 5000);
</script>
{% endblock %}
