{% extends "base.html" %}

{% block title %}任务队列 - Twitter内容保存工具{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-list-task"></i> 任务队列</h2>
    <div>
        <select class="form-select" id="status-filter" style="width: auto; display: inline-block;">
            <option value="">所有状态</option>
            <option value="pending">等待中</option>
            <option value="processing">处理中</option>
            <option value="completed">已完成</option>
            <option value="failed">失败</option>
        </select>
        <button class="btn btn-outline-primary ms-2" onclick="loadTasks()">
            <i class="bi bi-arrow-clockwise"></i> 刷新
        </button>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <div id="loading" class="text-center py-4">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">加载中...</span>
            </div>
        </div>

        <div id="tasks-container" style="display: none;">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>URL</th>
                            <th>状态</th>
                            <th>推文信息</th>
                            <th>创建时间</th>
                            <th>处理时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tasks-tbody">
                        <!-- 任务列表将在这里动态加载 -->
                    </tbody>
                </table>
            </div>

            <!-- 分页 -->
            <nav aria-label="任务分页">
                <ul class="pagination justify-content-center" id="pagination">
                    <!-- 分页按钮将在这里动态生成 -->
                </ul>
            </nav>
        </div>

        <div id="no-tasks" class="text-center py-4" style="display: none;">
            <i class="bi bi-inbox" style="font-size: 3rem; color: #6c757d;"></i>
            <p class="text-muted mt-2">暂无任务</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let currentPage = 1;
    const perPage = 20;

    // 加载任务列表
    function loadTasks(page = 1) {
        const statusFilter = document.getElementById('status-filter').value;
        const loading = document.getElementById('loading');
        const container = document.getElementById('tasks-container');
        const noTasks = document.getElementById('no-tasks');

        loading.style.display = 'block';
        container.style.display = 'none';
        noTasks.style.display = 'none';

        const params = new URLSearchParams({
            page: page,
            per_page: perPage
        });

        if (statusFilter) {
            params.append('status', statusFilter);
        }

        fetch(`/api/tasks?${params}`)
            .then(response => response.json())
            .then(data => {
                loading.style.display = 'none';

                if (data.tasks.length === 0) {
                    noTasks.style.display = 'block';
                    return;
                }

                container.style.display = 'block';
                renderTasks(data.tasks);
                renderPagination(data.page, data.pages, data.total);
                currentPage = page;
            })
            .catch(error => {
                console.error('Error loading tasks:', error);
                loading.style.display = 'none';
                showToast('加载任务失败', 'error');
            });
    }

    // 渲染任务列表
    function renderTasks(tasks) {
        const tbody = document.getElementById('tasks-tbody');
        tbody.innerHTML = '';

        tasks.forEach(task => {
            const row = document.createElement('tr');

            // 状态样式
            const statusClass = `status-${task.status}`;
            const statusText = {
                'pending': '等待中',
                'processing': '处理中',
                'completed': '已完成',
                'failed': '失败'
            }[task.status] || task.status;

            // 推文信息
            let tweetInfo = '-';
            if (task.author_username && task.tweet_id) {
                tweetInfo = `@${task.author_username}`;
                if (task.is_thread) {
                    tweetInfo += ` (串推 ${task.tweet_count}条)`;
                }
                if (task.media_count > 0) {
                    tweetInfo += ` <i class="bi bi-image" title="${task.media_count}个媒体文件"></i>`;
                }
            }

            // 操作按钮
            let actions = '<div class="btn-group">';
            if (task.status === 'completed') {
                // 使用 share_slug 如果存在，否则使用 ID（向后兼容）
                const viewUrl = task.share_slug ? `/view/${task.share_slug}` : `/view/${task.id}`;
                actions += `<a href="${viewUrl}" class="btn btn-sm btn-outline-primary" target="_blank">
                    <i class="bi bi-eye"></i> 查看
                </a>`;
            } else if (task.status === 'failed') {
                actions += `<button class="btn btn-sm btn-outline-warning" onclick="showError(${task.id}, '${task.error_message || ''}')">
                    <i class="bi bi-exclamation-triangle"></i> 错误
                </button>`;
            }

            actions += `<button class="btn btn-sm btn-outline-danger" onclick="deleteTask(${task.id}, this)" title="删除任务">
                <i class="bi bi-trash"></i>
            </button></div>`;

            row.innerHTML = `
                <td>${task.id}</td>
                <td>
                    <a href="${task.url}" target="_blank" class="text-decoration-none">
                        ${task.url.length > 50 ? task.url.substring(0, 50) + '...' : task.url}
                    </a>
                </td>
                <td><span class="${statusClass}"><i class="bi bi-circle-fill"></i> ${statusText}</span></td>
                <td>${tweetInfo}</td>
                <td>${task.created_at || '-'}</td>
                <td>${task.processed_at || '-'}</td>
                <td>${actions}</td>
            `;

            tbody.appendChild(row);
        });
    }

    // 渲染分页
    function renderPagination(currentPage, totalPages, totalItems) {
        const pagination = document.getElementById('pagination');
        pagination.innerHTML = '';

        if (totalPages <= 1) return;

        // 上一页
        const prevLi = document.createElement('li');
        prevLi.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
        prevLi.innerHTML = `<a class="page-link" href="#" onclick="loadTasks(${currentPage - 1})">上一页</a>`;
        pagination.appendChild(prevLi);

        // 页码
        const startPage = Math.max(1, currentPage - 2);
        const endPage = Math.min(totalPages, currentPage + 2);

        if (startPage > 1) {
            const li = document.createElement('li');
            li.className = 'page-item';
            li.innerHTML = `<a class="page-link" href="#" onclick="loadTasks(1)">1</a>`;
            pagination.appendChild(li);

            if (startPage > 2) {
                const li = document.createElement('li');
                li.className = 'page-item disabled';
                li.innerHTML = `<span class="page-link">...</span>`;
                pagination.appendChild(li);
            }
        }

        for (let i = startPage; i <= endPage; i++) {
            const li = document.createElement('li');
            li.className = `page-item ${i === currentPage ? 'active' : ''}`;
            li.innerHTML = `<a class="page-link" href="#" onclick="loadTasks(${i})">${i}</a>`;
            pagination.appendChild(li);
        }

        if (endPage < totalPages) {
            if (endPage < totalPages - 1) {
                const li = document.createElement('li');
                li.className = 'page-item disabled';
                li.innerHTML = `<span class="page-link">...</span>`;
                pagination.appendChild(li);
            }

            const li = document.createElement('li');
            li.className = 'page-item';
            li.innerHTML = `<a class="page-link" href="#" onclick="loadTasks(${totalPages})">${totalPages}</a>`;
            pagination.appendChild(li);
        }

        // 下一页
        const nextLi = document.createElement('li');
        nextLi.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
        nextLi.innerHTML = `<a class="page-link" href="#" onclick="loadTasks(${currentPage + 1})">下一页</a>`;
        pagination.appendChild(nextLi);
    }

    // 显示错误信息
    function showError(taskId, errorMessage) {
        showToast(`任务 ${taskId} 错误: ${errorMessage}`, 'error');
    }

    // 删除任务
    function deleteTask(taskId, btn) {
        if (confirm(`确定要删除任务 #${taskId} 吗？`)) {
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>';
            btn.disabled = true;

            fetch(`/delete/${taskId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showToast('任务已删除', 'success');
                        loadTasks(currentPage);
                    } else {
                        showToast(data.message || '删除失败', 'error');
                        btn.innerHTML = originalHtml;
                        btn.disabled = false;
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showToast('删除请求失败', 'error');
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                });
        }
    }

    // 状态过滤器变化
    document.getElementById('status-filter').addEventListener('change', function () {
        loadTasks(1);
    });

    // 初始加载
    loadTasks();

    // 定期刷新（仅当在第一页且没有状态过滤时）
    setInterval(() => {
        if (currentPage === 1 && !document.getElementById('status-filter').value) {
            loadTasks(1);
        }
    }, 5000);
</script>
{% endblock %}
