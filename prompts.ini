[gemini_tag_generation]
prompt = 分析以下推文内容，生成3-5个最合适的标签。

    推文内容:
    {text}

    要求:
    1. 根据推文内容自动生成最相关的3-5个标签
    2. 标签应该简洁、准确，能概括推文的主题、领域或特点
    3. 标签名使用中文或英文（根据内容而定），纯文本，不要包含emoji或特殊符号
    4. 每个标签2-4个字为佳，最多不超过6个字
    5. 为每个标签提供0.0-1.0的置信度分数
    6. 返回JSON格式: {{"tags": [{{"name": "标签名", "confidence": 0.85}}]}}

    标签类型参考（不限于此）:
    - 技术领域: AI, 编程, 设计, 产品, 前端开发, 后端开发等
    - 内容类型: 教程, 观点, 新闻, 资源, 案例分析, 经验分享等
    - 主题分类: 创业, 职场, 学习方法, 工具推荐, 思维方式等

    示例:
    推文: "刚用 TypeScript 重构了整个项目，类型安全真的能避免很多bug"
    返回: {{"tags": [{{"name": "编程", "confidence": 0.95}}, {{"name": "TypeScript", "confidence": 0.90}}, {{"name": "经验分享", "confidence": 0.85}}]}}

    请只返回JSON，不要有其他文字。

model = models/gemini-2.0-flash-exp

